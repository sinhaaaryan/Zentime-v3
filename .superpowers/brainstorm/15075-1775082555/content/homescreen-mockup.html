<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentime Home — Aurora Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 54px;
    border: 2px solid rgba(255,255,255,0.15);
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Aurora canvas fills phone */
  #auroraCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* UI overlay */
  .ui-layer {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
    overflow: hidden;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }

  /* Streak card */
  .streak-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-top: 12px;
  }
  .streak-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .streak-number {
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .streak-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .streak-dots {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .streak-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.07);
    font-weight: 600;
  }
  .streak-dot.done {
    background: rgba(100,120,255,0.35);
    color: rgba(255,255,255,0.9);
    border: 1px solid rgba(120,140,255,0.4);
  }

  /* Start button */
  .start-btn {
    background: #fff;
    color: #000;
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-top: 20px;
    letter-spacing: -0.3px;
  }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .mode-pill {
    flex: 1;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }
  .mode-pill.active {
    background: rgba(100,120,255,0.2);
    border-color: rgba(120,140,255,0.35);
    color: rgba(255,255,255,0.9);
  }
  .mode-pill .mode-icon { font-size: 18px; margin-bottom: 4px; }
  .mode-pill .mode-name { display: block; }

  .next-session {
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    margin-top: 12px;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <canvas id="auroraCanvas"></canvas>

  <div class="ui-layer">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●</span>
    </div>

    <div class="streak-card">
      <div class="streak-label">Current Streak</div>
      <div class="streak-number">3 <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,0.4)">days</span></div>
      <div class="streak-sub">You've reached your weekly goal!</div>
      <div class="streak-dots">
        <div class="streak-dot">M</div>
        <div class="streak-dot">T</div>
        <div class="streak-dot done">W</div>
        <div class="streak-dot done">T</div>
        <div class="streak-dot done">F</div>
        <div class="streak-dot">S</div>
        <div class="streak-dot">S</div>
      </div>
    </div>

    <div class="start-btn">Start Focus</div>

    <div class="mode-selector">
      <div class="mode-pill active">
        <div class="mode-icon">🎯</div>
        <span class="mode-name">Focus</span>
      </div>
      <div class="mode-pill">
        <div class="mode-icon">☕</div>
        <span class="mode-name">Short Break</span>
      </div>
      <div class="mode-pill">
        <div class="mode-icon">🌿</div>
        <span class="mode-name">Long Break</span>
      </div>
    </div>

    <div class="next-session">Next Session 10:00 AM</div>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
const canvas = document.getElementById('auroraCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 390;
canvas.height = 844;

// Stars
const stars = Array.from({length: 160}, () => ({
  x: Math.random() * 390,
  y: Math.random() * 844,
  r: Math.random() * 1.3 + 0.15,
  op: Math.random() * 0.55 + 0.15,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.6 + 0.25,
  color: ['#fff','#c8d0ff','#b0b8ff','#d0d8ff'][Math.floor(Math.random()*4)]
}));

// Aurora bands — each has center, size, color, drift params
const auroraBands = [
  { cx: 0.55, cy: 0.18, rx: 320, ry: 120, color: [80, 40, 255], op: 0.22, driftX: 28, driftY: 18, period: 11, phaseX: 0,    phaseY: 1.2 },
  { cx: 0.25, cy: 0.28, rx: 260, ry: 100, color: [110, 0, 220], op: 0.18, driftX: 20, driftY: 22, period: 14, phaseX: 2.1,  phaseY: 0.5 },
  { cx: 0.72, cy: 0.42, rx: 200, ry: 90,  color: [0,  60, 255], op: 0.16, driftX: 22, driftY: 16, period: 9,  phaseX: 4.3,  phaseY: 3.1 },
  { cx: 0.40, cy: 0.12, rx: 280, ry: 80,  color: [60, 20, 200], op: 0.14, driftX: 18, driftY: 14, period: 16, phaseX: 1.5,  phaseY: 2.8 },
  { cx: 0.60, cy: 0.55, rx: 180, ry: 70,  color: [40, 80, 255], op: 0.12, driftX: 15, driftY: 20, period: 12, phaseX: 3.7,  phaseY: 0.9 },
];

// Subtle shimmer lines (narrow horizontal bands of light)
const shimmerLines = Array.from({length: 6}, (_, i) => ({
  y: 60 + i * 110 + Math.random() * 40,
  width: 120 + Math.random() * 180,
  x: 30 + Math.random() * 200,
  op: 0.04 + Math.random() * 0.06,
  phase: Math.random() * Math.PI * 2,
  period: 6 + Math.random() * 8
}));

function draw(ts) {
  const t = ts / 1000;
  ctx.clearRect(0, 0, 390, 844);

  // Deep background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, 844);
  bg.addColorStop(0, '#02000e');
  bg.addColorStop(0.5, '#010008');
  bg.addColorStop(1, '#000005');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 390, 844);

  // Aurora bands (blurred radial gradients via layered ellipses)
  for (const band of auroraBands) {
    const dx = Math.sin(t / band.period * Math.PI * 2 + band.phaseX) * band.driftX;
    const dy = Math.cos(t / band.period * Math.PI * 2 + band.phaseY) * band.driftY;
    const cx = band.cx * 390 + dx;
    const cy = band.cy * 844 + dy;

    // Pulse opacity
    const pulse = 0.75 + 0.25 * Math.sin(t * 0.4 + band.phaseX);
    const alpha = band.op * pulse;

    // Draw multiple layers for soft falloff
    for (let layer = 4; layer >= 1; layer--) {
      const rx = band.rx * (1 + layer * 0.15);
      const ry = band.ry * (1 + layer * 0.15);
      const layerAlpha = alpha * (layer / 4) * 0.7;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(1, ry / rx);

      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
      const [r, g, b] = band.color;
      grad.addColorStop(0, `rgba(${r},${g},${b},${layerAlpha})`);
      grad.addColorStop(0.5, `rgba(${r},${g},${b},${layerAlpha * 0.4})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);

      ctx.fillStyle = grad;
      ctx.globalCompositeOperation = 'screen';
      ctx.beginPath();
      ctx.arc(0, 0, rx, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Shimmer lines
  ctx.globalCompositeOperation = 'screen';
  for (const line of shimmerLines) {
    const shimmer = 0.5 + 0.5 * Math.sin(t / line.period * Math.PI * 2 + line.phase);
    ctx.globalAlpha = line.op * shimmer;
    const grad = ctx.createLinearGradient(line.x, 0, line.x + line.width, 0);
    grad.addColorStop(0, 'rgba(100,120,255,0)');
    grad.addColorStop(0.5, 'rgba(140,160,255,1)');
    grad.addColorStop(1, 'rgba(100,120,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(line.x, line.y - 1, line.width, 2);
  }

  // Stars
  ctx.globalCompositeOperation = 'source-over';
  for (const s of stars) {
    const twinkle = 0.2 + 0.8 * ((Math.sin(t * s.speed + s.phase) + 1) / 2);
    ctx.globalAlpha = s.op * twinkle;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    // Cross spike for larger stars
    if (s.r > 1.0 && s.op * twinkle > 0.4) {
      ctx.globalAlpha = s.op * twinkle * 0.25;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(s.x - s.r * 3, s.y);
      ctx.lineTo(s.x + s.r * 3, s.y);
      ctx.moveTo(s.x, s.y - s.r * 3);
      ctx.lineTo(s.x, s.y + s.r * 3);
      ctx.stroke();
    }
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
